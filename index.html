<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- (ALL YOUR EXISTING CODE ABOVE REMAINS SAME) -->

  <!-- TASK MODAL -->
  <div id="task-modal-overlay" class="task-modal-overlay hidden">
    <div class="task-modal">
      <div class="task-modal-header">
        <h3>Create New Task</h3>
        <button id="close-task-modal-btn" class="close-modal-btn">×</button>
      </div>

      <form id="task-form" class="task-form">
        <div class="form-group">
          <label for="task-title">Task Title</label>
          <input type="text" id="task-title" placeholder="Enter task title" />
        </div>

        <div class="form-group">
          <label for="task-description">Description</label>
          <textarea id="task-description" placeholder="Enter task description" rows="4"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="task-severity">Severity</label>
            <select id="task-severity">
              <option value="">Select severity</option>
              <option value="High">High</option>
              <option value="Medium">Medium</option>
              <option value="Low">Low</option>
            </select>
          </div>

          <div class="form-group">
            <label for="task-status">Status</label>
            <select id="task-status">
              <option value="">Select status</option>
              <option value="Pending">Pending</option>
              <option value="In Progress">In Progress</option>
              <option value="Completed">Completed</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="task-deadline">Deadline</label>
            <input type="date" id="task-deadline" />
          </div>

          <!-- ✅ FIXED SECTION -->
          <div class="form-group">
            <label for="task-assigned-to">Assigned To</label>
            <select id="task-assigned-to">
              <option value="">Select member</option>
              <option value="Rahul">Rahul</option>
              <option value="Sneha">Sneha</option>
              <option value="Amit">Amit</option>
              <option value="Priya">Priya</option>
            </select>
          </div>
        </div>

        <button type="submit" class="primary-btn">Save Task</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
