<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-logo">TT</div>
      <h1>Team Task Manager</h1>
      <p class="login-subtitle">Sign in to continue</p>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button id="login-btn" class="login-btn">Login</button>
      <p id="login-message" class="login-message"></p>
    </div>
  </div>

  <!-- App -->
  <div id="app-screen" class="app-container hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo-section">
        <div class="logo-box">TT</div>
        <div>
          <h2>Team Task Manager</h2>
          <p>Company Workspace</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <button class="nav-item active" data-section="dashboard-section">Dashboard</button>
        <button class="nav-item" data-section="chat-section">Chat</button>
        <button class="nav-item" data-section="group-chat-section">Group Chat</button>
        <button class="nav-item" data-section="tasks-section">Tasks</button>
        <button class="nav-item" data-section="notifications-section">Notifications</button>
        <button class="nav-item" data-section="team-section">Team</button>
        <button class="nav-item" data-section="settings-section">Settings</button>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main-content">

      <!-- Dashboard -->
      <section id="dashboard-section" class="content-section active-section">
        <h1>Dashboard</h1>
      </section>

      <!-- Chat (ONLY 1-to-1 now) -->
      <section id="chat-section" class="content-section">
        <div class="panel full-height">
          <div class="panel-header">
            <h3>1-to-1 Chat</h3>
          </div>

          <div class="chat-layout">
            <div class="chat-users" id="chat-users-list"></div>

            <div class="chat-window">
              <div class="chat-messages" id="chat-messages"></div>

              <div class="chat-input-row">
                <input type="text" id="chat-message-input" placeholder="Type message..." />
                <button id="send-message-btn">Send</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ✅ NEW GROUP CHAT SECTION -->
      <section id="group-chat-section" class="content-section" style="display:none;">
        <div class="panel full-height">

          <div class="panel-header">
            <h3>Group Chat (Real-Time)</h3>
          </div>

          <div class="group-chat-wrapper">

            <div class="group-chat-tabs">
              <button class="room-tab active" data-room="general">General</button>
              <button class="room-tab" data-room="tasks">Tasks</button>
              <button class="room-tab" data-room="announcements">Announcements</button>
            </div>

            <div class="active-room-label">
              Active room: <span id="active-room-name">General</span>
            </div>

            <div id="group-chat-messages" class="group-chat-messages"></div>

            <div class="group-chat-input-row">
              <input type="text" id="group-message-input" placeholder="Type group message..." />
              <button id="send-group-message-btn">Send</button>
            </div>

          </div>
        </div>
      </section>

      <!-- Tasks -->
      <section id="tasks-section" class="content-section">
        <h1>Tasks</h1>
      </section>

      <!-- Notifications -->
      <section id="notifications-section" class="content-section">
        <h1>Notifications</h1>
      </section>

      <!-- Team -->
      <section id="team-section" class="content-section">
        <h1>Team</h1>
      </section>

      <!-- Settings -->
      <section id="settings-section" class="content-section">
        <h1>Settings</h1>
      </section>

    </main>
  </div>

  <script src="script.js"></script>
  <script type="module" src="group-chat.js"></script>

</body>
</html>
